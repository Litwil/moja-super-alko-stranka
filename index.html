<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Koktaily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #c9a85c;
    --accent2: #e8c97a;
    --text: #e8e8f0;
    --muted: #888899;
    --card-bg: #16161f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    position: relative;
    text-align: center;
    padding: 60px 20px 30px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0f0f18 0%, transparent 100%);
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .logo-line {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 24px;
  }

  /* Search bar */
  .search-wrap {
    display: flex;
    justify-content: center;
    margin-top: 20px;
  }

  #searchBar {
    width: 320px;
    padding: 12px 20px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 30px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchBar::placeholder { color: var(--muted); }

  #searchBar:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,168,92,0.15);
  }

  /* Tab nav */
  .category-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
    justify-content: center;
  }
  .category-nav::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    padding: 16px 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    transition: color 0.25s;
  }

  .cat-btn .icon {
    display: block;
    font-size: 20px;
    margin-bottom: 4px;
    transition: transform 0.25s;
  }

  .cat-btn:hover { color: var(--text); }
  .cat-btn:hover .icon { transform: scale(1.15); }
  .cat-btn.active { color: var(--accent); }

  .cat-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 20%;
    width: 60%; height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--accent);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-title .big-icon { font-size: 32px; }
  .section-desc { color: var(--muted); font-size: 14px; margin-bottom: 32px; font-weight: 300; }

  #mojDivVJs {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
  }

  .drinkCard {
    background-color: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 15px;
    width: 220px;
    transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
    cursor: pointer;
    text-align: left;
  }

  .drinkCard:hover {
    transform: scale(1.07);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border-color: var(--accent);
  }

  .drinkCard img {
    width: 100%;
    border-radius: 15px;
  }

  .drinkCard h3 {
    margin: 10px 0 5px 0;
    font-size: 16px;
    font-family: 'Playfair Display', serif;
    color: var(--text);
  }

  .drinkCard p {
    font-size: 13px;
    line-height: 1.4;
    color: var(--muted);
  }

  .loading {
    width: 100%;
    text-align: center;
    padding: 80px;
    color: var(--muted);
    font-size: 15px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { width: 100%; text-align: center; padding: 80px; color: var(--muted); }

  @media (max-width: 600px) {
    .category-nav { justify-content: flex-start; }
    #searchBar { width: 90%; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-line">Cocktail Bar</div>
  <div class="subtitle">Objavuj recepty podľa alkoholu</div>
  <div class="search-wrap">
    <input type="text" id="searchBar" placeholder="🔍  Hľadaj koktail..." onkeyup="searchDrink()">
  </div>
</header>

<nav class="category-nav" id="categoryNav"></nav>

<main>
  <div id="sectionHeader"></div>
  <div id="mojDivVJs"></div>
</main>

<script>
const mojDivVJs = document.getElementById("mojDivVJs");
const secHeader = document.getElementById("sectionHeader");
const searchBar = document.getElementById("searchBar");

const categories = [
  { label: "Vodka",     icon: "🫧", terms: ["vodka", "cosmopolitan", "martini"] },
  { label: "Gin",       icon: "🌿", terms: ["gin", "negroni", "gimlet"] },
  { label: "Rum",       icon: "🥤", terms: ["rum", "mojito", "daiquiri"] },
  { label: "White Rum", icon: "🍹", terms: ["mojito", "pina colada", "daiquiri"] },
  { label: "Whiskey",   icon: "🥃", terms: ["whiskey", "manhattan", "sour"] },
  { label: "Bourbon",   icon: "🍂", terms: ["bourbon", "julep", "old fashioned"] },
  { label: "Tequila",   icon: "🌵", terms: ["tequila", "margarita", "paloma"] },
  { label: "Champagne", icon: "🥂", terms: ["champagne", "bellini", "kir"] },
  { label: "Brandy",    icon: "🍷", terms: ["brandy", "sidecar", "stinger"] },
  { label: "Amaretto",  icon: "🌰", terms: ["amaretto", "godfather", "alabama"] },
];

let activeIndex = null;
let searchMode  = false;
const cache = {};

// Build nav tabs
const nav = document.getElementById("categoryNav");
categories.forEach((cat, i) => {
  const btn = document.createElement("button");
  btn.className = "cat-btn";
  btn.dataset.i = i;
  btn.innerHTML = `<span class="icon">${cat.icon}</span>${cat.label}`;
  btn.onclick = () => {
    searchBar.value = "";
    searchMode = false;
    loadCategory(i);
  };
  nav.appendChild(btn);
});

// Search — uses the original working approach
function searchDrink() {
  const query = searchBar.value.trim();
  if (!query) {
    // If search cleared, go back to active category
    searchMode = false;
    if (activeIndex !== null) loadCategory(activeIndex, true);
    return;
  }
  searchMode = true;
  // Deactivate all tabs visually
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  secHeader.innerHTML = `
    <h2 class="section-title"><span class="big-icon">🔍</span>Výsledky pre „${query}"</h2>
    <p class="section-desc">&nbsp;</p>
  `;
  loadDrinks(query);
}

// Original loadDrinks from your code
async function loadDrinks(query = "") {
  mojDivVJs.innerHTML = `<div class="loading"><div class="spinner"></div>Načítavam koktaily... 🍹</div>`;
  try {
    const res  = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${query}`);
    const data = await res.json();
    const drinks = Array.isArray(data.drinks) ? data.drinks : [];
    displayDrinks(drinks);
  } catch (err) {
    mojDivVJs.innerHTML = `<div class="empty">Nepodarilo sa načítať koktaily 😢</div>`;
    console.error(err);
  }
}

async function loadCategory(index, force = false) {
  if (activeIndex === index && !force) return;
  activeIndex = index;
  const cat = categories[index];

  document.querySelectorAll(".cat-btn").forEach((b, i) =>
    b.classList.toggle("active", i === index)
  );

  secHeader.innerHTML = `
    <h2 class="section-title"><span class="big-icon">${cat.icon}</span>${cat.label}</h2>
    <p class="section-desc">Koktaily s ${cat.label}</p>
  `;

  if (cache[index]) { displayDrinks(cache[index]); return; }

  mojDivVJs.innerHTML = `<div class="loading"><div class="spinner"></div>Načítavam koktaily... 🍹</div>`;

  try {
    const results = await Promise.all(
      cat.terms.map(term =>
        fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${term}`)
          .then(res => res.json())
          .then(data => Array.isArray(data.drinks) ? data.drinks : [])
          .catch(() => [])
      )
    );

    const seen = new Set();
    const drinks = [];
    for (const batch of results) {
      for (const drink of batch) {
        if (!seen.has(drink.idDrink)) {
          seen.add(drink.idDrink);
          drinks.push(drink);
        }
      }
    }

    cache[index] = drinks;
    displayDrinks(drinks);
  } catch (err) {
    mojDivVJs.innerHTML = `<div class="empty">Nepodarilo sa načítať koktaily 😢</div>`;
    console.error(err);
  }
}

function displayDrinks(drinks) {
  mojDivVJs.innerHTML = "";
  if (drinks.length === 0) {
    mojDivVJs.innerHTML = `<div class="empty">Koktaily nenájdené 🔍</div>`;
    return;
  }
  drinks.forEach(drink => {
    const card = document.createElement("div");
    card.className = "drinkCard";
    card.innerHTML = `
      <img src="${drink.strDrinkThumb}" alt="${drink.strDrink}">
      <h3>${drink.strDrink}</h3>
      <p>${drink.strInstructions ? drink.strInstructions.substring(0, 60) + "..." : "Bez inštrukcií"}</p>
    `;
    mojDivVJs.appendChild(card);
  });
}

loadCategory(0);
</script>
</body>
</html>
